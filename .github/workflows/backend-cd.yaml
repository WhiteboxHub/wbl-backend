name: CD - Cloud Run (Prod)

on:
  push:
    branches: [ main ]

jobs:
  deploy-and-verify:
    name: Deploy to Cloud Run with Auto-Rollback
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Save Previous Active Revision
        run: |
          PREV_REV=$(gcloud run services describe fastapi-backend --region us-central1 --format='value(status.traffic[0].revisionName)' 2>/dev/null || echo "")
          echo "PREV_REVISION=$PREV_REV" >> $GITHUB_ENV
          echo "Stored previous active revision: $PREV_REV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fastapi-backend \
            --source . \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080

      - name: Install Smoke Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest

      - name: Execute Live Smoke Tests
        run: |
          PROD_URL=$(gcloud run services describe fastapi-backend --region us-central1 --format='value(status.url)')
          echo "PROD_URL=$PROD_URL" >> $GITHUB_ENV
          echo "Testing live deployment at $PROD_URL"
          PROD_URL=$PROD_URL pytest tests/smoke/test_production_smoke.py -v

      - name: Rollback on Smoke Test Failure
        if: failure() && env.PREV_REVISION != ''
        run: |
          echo "Smoke tests failed! Initiating safety rollback to previous revision: ${{ env.PREV_REVISION }}"
          gcloud run services update-traffic fastapi-backend \
            --region us-central1 \
            --to-revisions=${{ env.PREV_REVISION }}=100
          echo "Successfully rolled back traffic to ${{ env.PREV_REVISION }}."
