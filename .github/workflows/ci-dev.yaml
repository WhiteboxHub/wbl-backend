#wbl-backend\.github\workflows\ci-dev.yaml

name: CI - Dev Branch

on:
  pull_request:
    branches: [ dev ]
  push:
    branches: [ dev ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-github-actions-annotate-failures



    - name: Run Pytest Suite
      env:
        SECRET_KEY: "mock_test_secret_key_12345"  # pragma: allowlist secret
        ALGORITHM: "HS256"
        UPSTASH_REDIS_REST_URL: "https://mock-redis.upstash.io"
        UPSTASH_REDIS_REST_TOKEN: "mock_token"
        DB_PASSWORD: "mock_password"  # pragma: allowlist secret
        DB_HOST: "localhost"
        DB_NAME: "wbl_test"
        ENV: "test"
        MAIL_PORT: "587"
        MAIL_USERNAME: "mock_username"
        MAIL_PASSWORD: "mock_password"  # pragma: allowlist secret
        MAIL_SERVER: "smtp.mock.com"
        MAIL_FROM: "mock@mock.com"
      run: |
        # Run suite while ignoring smoke tests
        pytest --ignore=tests/smoke -v

    - name: Docker build check
      run: |
        docker build -t fastapi-test .
