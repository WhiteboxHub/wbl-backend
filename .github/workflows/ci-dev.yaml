name: CI - Dev Branch

on:
  pull_request:
    branches: [ dev ]
  push:
    branches: [ dev ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        PYTHONPATH=. pytest --ignore=tests/smoke tests/

    # Optional: Docker build check (no push)
    - name: Docker build check
      run: |
        docker build -t fastapi-test .

  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install -r requirements.txt openai python-dotenv

      - name: Run Smart AI Code Review
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEY_1 }},${{ secrets.GEMINI_API_KEY_2 }},${{ secrets.GEMINI_API_KEY_3 }},${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL_REGISTRY_URL: ${{ secrets.MODEL_REGISTRY_URL }}
        run: |
          python .github/scripts/demo_review.py -r . -m smart > review_output.txt || (cat review_output.txt && exit 1)

      - name: Post PR Comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s review_output.txt ]; then
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              gh pr comment ${{ github.event.pull_request.number }} -F review_output.txt
            else
              gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
                -F body=@review_output.txt
            fi
          else
            echo "No review output generated or file is empty."
          fi
