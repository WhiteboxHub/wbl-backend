#wbl-backend\.github\workflows\ci-dev.yaml

name: CI - Dev Branch

on:
  pull_request:
    branches: [ dev ]
  push:
    branches: [ dev ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-github-actions-annotate-failures pytest-mock



    - name: Run Pytest Suite
      env:
        SECRET_KEY: "mock_test_secret_key_12345"  # pragma: allowlist secret
        ALGORITHM: "HS256"
        UPSTASH_REDIS_REST_URL: "https://mock-redis.upstash.io"
        UPSTASH_REDIS_REST_TOKEN: "mock_token"
        DB_PASSWORD: "mock_password"  # pragma: allowlist secret
        DB_HOST: "localhost"
        DB_NAME: "wbl_test"
        ENV: "test"
        MAIL_PORT: "587"
        MAIL_USERNAME: "mock_username"
        MAIL_PASSWORD: "mock_password"  # pragma: allowlist secret
        MAIL_SERVER: "smtp.mock.com"
        MAIL_FROM: "mock@mock.com"
      run: |
        # Run suite while ignoring smoke tests
        pytest --ignore=tests/smoke -v
    - name: Docker build check
      run: |
        docker build -t fastapi-test .

  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Review
        uses: Nikita-Filonov/ai-review@v0.67.0
        with:
          review-command: run-summary
        env:
          AGENT__ENABLED: "false"

          LLM__PROVIDER: "GEMINI"
          LLM__META__MODEL: "gemini-1.5-flash"
          LLM__META__MAX_TOKENS: "15000"
          LLM__META__TEMPERATURE: "0.2"
          LLM__HTTP_CLIENT__API_TOKEN: ${{ secrets.GEMINI_API_KEY }}

          VCS__PROVIDER: "GITHUB"
          VCS__PIPELINE__OWNER: ${{ github.repository_owner }}
          VCS__PIPELINE__REPO: ${{ github.event.repository.name }}
          VCS__PIPELINE__PULL_NUMBER: ${{ github.event.pull_request.number }}
          VCS__HTTP_CLIENT__API_URL: "https://api.github.com"
          VCS__HTTP_CLIENT__API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
