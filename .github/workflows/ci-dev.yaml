#wbl-backend\.github\workflows\ci-dev.yaml

name: CI - Dev Branch

on:
  pull_request:
    branches: [ dev ]
  push:
    branches: [ dev ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest pytest-github-actions-annotate-failures pytest-mock



    - name: Run Pytest Suite
      env:
        SECRET_KEY: "mock_test_secret_key_12345"  # pragma: allowlist secret
        ALGORITHM: "HS256"
        UPSTASH_REDIS_REST_URL: "https://mock-redis.upstash.io"
        UPSTASH_REDIS_REST_TOKEN: "mock_token"
        DB_PASSWORD: "mock_password"  # pragma: allowlist secret
        DB_HOST: "localhost"
        DB_NAME: "wbl_test"
        ENV: "test"
        MAIL_PORT: "587"
        MAIL_USERNAME: "mock_username"
        MAIL_PASSWORD: "mock_password"  # pragma: allowlist secret
        MAIL_SERVER: "smtp.mock.com"
        MAIL_FROM: "mock@mock.com"
      run: |
        # Run suite while ignoring smoke tests
        pytest --ignore=tests/smoke -v
    - name: Docker build check
      run: |
        docker build -t fastapi-test .

  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install openai python-dotenv

      - name: Run Smart AI Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/scripts/demo_review.py -r . -m smart > review_output.txt

      - name: Post PR Comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s review_output.txt ]; then
            gh pr comment ${{ github.event.pull_request.number }} -F review_output.txt
          else
            echo "No review output generated or file is empty."
          fi
